<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Examen de Ortodoncia - RA 5</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        .header { background: white; border-radius: 20px; padding: 30px; margin-bottom: 20px; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
        .header h1 { color: #333; font-size: 2em; margin-bottom: 10px; }
        .header p { color: #666; font-size: 1.1em; }
        .progress-bar { background: #e0e0e0; border-radius: 10px; height: 20px; margin: 20px 0; overflow: hidden; }
        .progress-fill { background: linear-gradient(90deg, #667eea, #764ba2); height: 100%; transition: width 0.3s ease; border-radius: 10px; }
        .question-card { background: white; border-radius: 15px; padding: 25px; margin-bottom: 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        .question-number { color: #667eea; font-weight: bold; font-size: 0.9em; margin-bottom: 10px; }
        .question-text { color: #333; font-size: 1.1em; line-height: 1.6; margin-bottom: 15px; }
        .question-image { max-width: 100%; border-radius: 10px; margin: 15px 0; box-shadow: 0 3px 10px rgba(0,0,0,0.1); }
        .options { display: flex; flex-direction: column; gap: 10px; }
        .option { padding: 15px 20px; background: #f8f9fa; border: 2px solid #e0e0e0; border-radius: 10px; cursor: pointer; transition: all 0.3s ease; }
        .option:hover { border-color: #667eea; background: #f0f0ff; }
        .option.correct { border-color: #28a745; background: #d4edda; color: #155724; }
        .option.incorrect { border-color: #dc3545; background: #f8d7da; color: #721c24; }
        .btn { background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; padding: 15px 40px; font-size: 1.1em; border-radius: 30px; cursor: pointer; transition: transform 0.2s; margin: 10px 5px; }
        .btn:hover { transform: scale(1.05); }
        .result { background: white; border-radius: 20px; padding: 40px; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
        .result h2 { font-size: 2.5em; margin-bottom: 20px; }
        .result .score { font-size: 4em; font-weight: bold; color: #667eea; }
        .result .message { font-size: 1.3em; color: #666; margin: 20px 0; }
        .share-box { background: #f8f9fa; border-radius: 10px; padding: 20px; margin-top: 20px; }
        .share-box input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; margin: 10px 0; }
        .nav-buttons { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
        .hidden { display: none; }
        .stats { display: flex; justify-content: space-around; margin: 20px 0; }
        .stat { text-align: center; padding: 15px; background: #f8f9fa; border-radius: 10px; min-width: 100px; }
        .stat-value { font-size: 2em; font-weight: bold; color: #667eea; }
        .stat-label { color: #666; font-size: 0.9em; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header" id="header">
            <h1>Examen de Ortodoncia - RA 5</h1>
            <p>Test interactivo - 30 preguntas</p>
            <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
            <div class="stats">
                <div class="stat"><div class="stat-value" id="currentQ">1</div><div class="stat-label">Pregunta</div></div>
                <div class="stat"><div class="stat-value" id="correctCount">0</div><div class="stat-label">Correctas</div></div>
                <div class="stat"><div class="stat-value" id="incorrectCount">0</div><div class="stat-label">Incorrectas</div></div>
            </div>
            <button class="btn" id="startBtn" onclick="startExam()">Comenzar Examen</button>
        </div>
        <div id="questionsContainer"></div>
        <div class="result hidden" id="result">
            <h2>Resultados del Examen</h2>
            <div class="score"><span id="finalScore">0</span>/30</div>
            <div class="message" id="message"></div>
            <div class="stats">
                <div class="stat"><div class="stat-value" id="finalCorrect">0</div><div class="stat-label">Correctas</div></div>
                <div class="stat"><div class="stat-value" id="finalIncorrect">0</div><div class="stat-label">Incorrectas</div></div>
            </div>
            <button class="btn" onclick="restartExam()">Reiniciar Examen</button>
            <div class="share-box">
                <h3>Compartir Resultados</h3>
                <p>Copia el enlace para compartir:</p>
                <input type="text" id="shareLink" readonly>
                <button class="btn" onclick="copyLink()">Copiar Enlace</button>
            </div>
        </div>
    </div>
    <script>
const questions = [{"id": 1, "text": "¿Qué es la ortodoncia?", "image": "page1_img1_X4.png", "options": ["La rama de la odontología que estudia el crecimiento óseo maxilar y el desarrollo de la oclusión", "La especialidad que trata únicamente problemas de estética dental", "El estudio de las enfermedades de las encías", "La rama de la medicina que estudia los huesos del cráneo"], "correct": 0}, {"id": 2, "text": "¿Cuál es el objetivo principal de la ortodoncia?", "image": "page1_img2_X9.png", "options": ["Solo mejorar la estética facial", "Establecer una oclusión y funciones orales normales para lograr equilibrio estético facial", "Extraer piezas dentarias dañadas", "Colocar implantes dentales"], "correct": 1}, {"id": 3, "text": "¿Según la clasificación de Angle-Dewey, la Maloclusión de Clase I se caracteriza por:", "image": "page2_img1_X13.png", "options": ["Molar inferior distal al superior", "Relaciones normales entre molares con línea de oclusión incorrecta", "Molar inferior mesial al superior", "Ausencia total de piezas dentarias"], "correct": 1}, {"id": 4, "text": "En la Maloclusión Clase I Tipo I (Angle-Dewey), ¿cómo se manifiestan los incisivos?", "image": "page2_img2_X14.png", "options": ["Apiñamiento de incisivos y caninos vestibularizados", "Mordida cruzada anterior", "Mordida cruzada posterior", "Incisivos lingualizados"], "correct": 0}, {"id": 5, "text": "La Maloclusión Clase II de Angle se caracteriza por:", "image": "page2_img3_X15.png", "options": ["Molar inferior mesial al superior", "Molar inferior distal en relación con el molar superior", "Resalte muy aumentado", "Sobremordida profunda"], "correct": 1}, {"id": 6, "text": "¿Cuál es la diferencia entre la División primera y segunda de la Clase II?", "image": "page2_img4_X16.png", "options": ["División 1ª: resalte aumentado; División 2ª: sobremordida aumentada y resalte reducido", "División 1ª: mordida abierta; División 2ª: mordida profunda", "División 1ª: apiñamiento; División 2ª: diastemas", "No existe diferencia entre ambas divisiones"], "correct": 0}, {"id": 7, "text": "La Maloclusión Clase III se caracteriza por:", "image": "page2_img5_X17.png", "options": ["Molar inferior distal al superior", "Molar inferior mesial en relación con el molar superior", "Resalte muy aumentado", "Sobremordida profunda"], "correct": 1}, {"id": 8, "text": "¿Cuántas son las Llaves de la Oclusión según Andrews?", "image": "page3_img1_X23.png", "options": ["3 llaves", "4 llaves", "6 llaves", "8 llaves"], "correct": 2}, {"id": 9, "text": "¿Qué es el 'tip' o angulación coronal?", "image": "page3_img2_X24.png", "options": ["La rotación del diente sobre su eje", "Los grados entre el eje mayor del diente y la perpendicular al plano oclusal", "El movimiento vertical del diente", "La inclinación del plano oclusal"], "correct": 1}, {"id": 10, "text": "¿Qué es el 'torque' o inclinación coronal?", "image": "page3_img3_X25.png", "options": ["La rotación horizontal del diente", "Los grados entre la tangente a la zona más vestibular del conducto coronal y la perpendicular al plano oclusal", "El movimiento de tracción del diente", "La distancia entre dientes"], "correct": 1}, {"id": 11, "text": "Respecto a las rotaciones en las Llaves de Andrews:", "image": "page5_img1_X30.png", "options": ["Todas las rotaciones ocupan más espacio", "Molares y premolares rotados ocupan más espacio; incisivos rotados ocupan menos", "Los incisivos rotados ocupan más espacio", "Las rotaciones no afectan al espacio en la arcada"], "correct": 1}, {"id": 12, "text": "¿Qué valor de resalte (overjet) se considera normal?", "image": "page5_img2_X31.png", "options": ["0 mm", "1 mm", "2-3 mm", "5-6 mm"], "correct": 2}, {"id": 13, "text": "¿Cuál es la mordida cubierta o sobremordida profunda?", "image": "page5_img3_X32.png", "options": ["Valor disminuido del plano vertical", "Valor aumentado del plano vertical", "Alteración transversal", "Alteración de la línea media"], "correct": 1}, {"id": 14, "text": "¿Qué es la curva de Spee?", "image": "page5_img4_X33.png", "options": ["Forma convexa hacia craneal observada en el plano frontal", "Forma cóncava hacia craneal observada en el plano sagital", "Forma cóncava hacia dorsal observada en el plano transversal", "Línea recta en el plano horizontal"], "correct": 1}, {"id": 15, "text": "¿Qué es la curva de Wilson?", "image": "page5_img5_X34.png", "options": ["Forma convexa hacia craneal en el plano sagital", "Forma cóncava hacia craneal observada en el plano frontal", "Forma lineal observada en el plano transversal", "Curva convexa hacia dorsal"], "correct": 1}, {"id": 16, "text": "¿Cuáles son los elementos activos principales de la aparatología fija?", "image": "page6_img1_X41.png", "options": ["Los brackets", "Las bandas", "Los arcos de alambre", "Los tubos molares"], "correct": 2}, {"id": 17, "text": "¿Para qué sirven las ligaduras elásticas y metálicas?", "image": "page6_img2_X42.png", "options": ["Generar expansión del paladar", "Unir el arco a las aletas del bracket y mantenerlo en su posición", "Corregir mordidas cruzadas", "Mantener el espacio tras extracciones"], "correct": 1}, {"id": 18, "text": "¿Cuál es la función principal de las cadenetas?", "image": "page6_img3_X43.png", "options": ["Unir brackets entre sí", "Generar fuerzas para cerrar espacios o mover piezas", "Expandir el paladar", "Corregir la mordida abierta"], "correct": 1}, {"id": 19, "text": "Los elásticos intermaxilares funcionan generando:", "image": "page6_img4_X44.png", "options": ["Fuerzas estáticas constantes", "Fuerzas sobre las piezas dentarias para realizar movimientos entre maxilares", "Solo fuerzas de expansión", "Fuerzas únicamente en un solo maxilar"], "correct": 1}, {"id": 20, "text": "¿Qué son los muelles, resortes o coil spring?", "image": "page6_img5_X45.png", "options": ["Bandas de separación", "Alambre metálico en forma de espiral para generar movimientos dentarios", "Elásticos intermaxilares", "Arcos vestibulares"], "correct": 1}, {"id": 21, "text": "¿Cuál es la diferencia entre brackets convencionales y de autoligado?", "image": "page6_img6_X46.png", "options": ["El material del que están hechos", "Los convencionales usan ligaduras; los de autoligado tienen un mecanismo incorporado", "El tamaño", "La ubicación en el diente"], "correct": 1}, {"id": 22, "text": "¿Qué son las bandas en ortodoncia?", "image": "page6_img7_X47.png", "options": ["Elásticos que rodean los dientes", "Anillos metálicos que rodean la corona dentaria cementados a las superficies verticales", "Arcos de alambre", "Tornillos de expansión"], "correct": 1}, {"id": 23, "text": "¿Cuáles son las fases de la técnica multibracket?", "image": "page6_img8_X48.png", "options": ["Solo alineamiento y nivelación", "Alineamiento, nivelación, corrección de clase molar, cierre de espacios y terminación", "Colocación de brackets y arcos", "Solo corrección de maloclusiones severas"], "correct": 1}, {"id": 24, "text": "¿Cuál es la función del mantenedor de espacio?", "image": "page7_img1_X55.png", "options": ["Corregir la mordida cruzada", "Conservar un espacio para la pieza definitiva o rehabilitación futura", "Expandir el paladar", "Rotar molares"], "correct": 1}, {"id": 25, "text": "El Quad-Helix es un aparato que sirve para:", "image": "page7_img2_X56.png", "options": ["Rotar molares", "Mantener espacio", "Expandir el paladar (tiene 4 helix)", "Corregir mordida abierta"], "correct": 2}, {"id": 26, "text": "¿Cuál es la ventaja principal de los aparatos removibles frente a los fijos?", "image": "page7_img3_X57.png", "options": ["Mayor control de movimiento", "No están fijos, mayor comodidad y estética", "Fuerzas continuas", "Movimiento más rápido"], "correct": 1}, {"id": 27, "text": "¿Qué es el arco vestibular activo (arco de Hawley)?", "image": "page7_img4_X58.png", "options": ["Un arco que se cementa a los dientes", "Un arco que recorre las superficies vestibulares y se activa para lingualizar dientes", "Un tornillo de expansión", "Un elástico intermaxilar"], "correct": 1}, {"id": 28, "text": "¿Qué son las férulas dentales?", "image": "page7_img5_X59.png", "options": ["Aparatos fijos de metal", "Aparatos removibles de plástico que se ajustan sobre las piezas dentarias", "Brackets estéticos", "Arcos de alambre"], "correct": 1}, {"id": 29, "text": "¿Cuál es la función de la mentonera?", "image": "page8_img1_X64.png", "options": ["Expandir el maxilar superior", "Tirar hacia atrás la mandíbula (zona occipital) o corregir mordida abierta (zona frontal)", "Corregir la mordida cruzada", "Mantener espacio entre dientes"], "correct": 1}, {"id": 30, "text": "¿Qué función tiene la máscara facial?", "image": "page8_img2_X65.png", "options": ["Solo expandir el paladar", "Traccionar el maxilar hacia afuera y la mandíbula hacia atrás", "Mantener el espacio post-extracción", "Corregir únicamente rotaciones molares"], "correct": 1}];

let currentQuestion = 0;
let correctAnswers = 0;
let incorrectAnswers = 0;
let answered = [];

function startExam() {
    document.getElementById('startBtn').classList.add('hidden');
    showQuestion(0);
}

function showQuestion(index) {
    const container = document.getElementById('questionsContainer');
    const q = questions[index];
    const card = document.createElement('div');
    card.className = 'question-card';
    card.id = 'question-' + index;
    let imageHtml = '';
    if (q.image && imageMap[q.image]) {
        imageHtml = '<img src="' + imageMap[q.image] + '" alt="Imagen" class="question-image">';
    }
    let optionsHtml = q.options.map((opt, i) => 
        '<div class="option" onclick="selectOption(' + index + ',' + i + ')">' + opt + '</div>'
    ).join('');
    card.innerHTML = '<div class="question-number">Pregunta ' + q.id + ' de 30</div>' +
        '<div class="question-text">' + q.text + '</div>' + imageHtml +
        '<div class="options">' + optionsHtml + '</div>' +
        '<div class="nav-buttons" style="margin-top:20px;">' +
        (index > 0 ? '<button class="btn" onclick="prevQuestion()">Anterior</button>' : '') +
        (index < questions.length - 1 ? 
            '<button class="btn" onclick="nextQuestion()">Siguiente</button>' : 
            '<button class="btn" onclick="showResults()">Ver Resultados</button>') +
        '</div>';
    container.innerHTML = '';
    container.appendChild(card);
    updateProgress();
}

function selectOption(qIndex, optIndex) {
    if (answered[qIndex]) return;
    answered[qIndex] = true;
    const q = questions[qIndex];
    const opts = document.querySelectorAll('#question-' + qIndex + ' .option');
    opts.forEach((opt, i) => {
        opt.style.pointerEvents = 'none';
        if (i === q.correct) opt.classList.add('correct');
        else if (i === optIndex && optIndex !== q.correct) opt.classList.add('incorrect');
    });
    if (optIndex === q.correct) correctAnswers++;
    else incorrectAnswers++;
    updateStats();
}

function updateProgress() {
    document.getElementById('progress').style.width = ((currentQuestion + 1) / questions.length * 100) + '%';
    document.getElementById('currentQ').textContent = currentQuestion + 1;
}

function updateStats() {
    document.getElementById('correctCount').textContent = correctAnswers;
    document.getElementById('incorrectCount').textContent = incorrectAnswers;
}

function nextQuestion() { if (currentQuestion < questions.length - 1) { currentQuestion++; showQuestion(currentQuestion); }}
function prevQuestion() { if (currentQuestion > 0) { currentQuestion--; showQuestion(currentQuestion); }}

function showResults() {
    document.getElementById('questionsContainer').innerHTML = '';
    document.getElementById('header').classList.add('hidden');
    document.getElementById('result').classList.remove('hidden');
    document.getElementById('finalScore').textContent = correctAnswers;
    document.getElementById('finalCorrect').textContent = correctAnswers;
    document.getElementById('finalIncorrect').textContent = incorrectAnswers;
    let pct = correctAnswers / 30 * 100;
    let msg = pct >= 90 ? 'Excelente! Dominas el tema.' : pct >= 70 ? 'Muy bien.' : pct >= 50 ? 'Aprobado.' : 'Necesitas estudiar mas.';
    document.getElementById('message').textContent = msg;
    document.getElementById('shareLink').value = window.location.origin + window.location.pathname + '?r=' + correctAnswers + '-' + incorrectAnswers;
}

function copyLink() { document.getElementById('shareLink').select(); document.execCommand('copy'); alert('Enlace copiado!'); }

function restartExam() {
    currentQuestion = 0; correctAnswers = 0; incorrectAnswers = 0; answered = [];
    document.getElementById('result').classList.add('hidden');
    document.getElementById('header').classList.remove('hidden');
    document.getElementById('startBtn').classList.remove('hidden');
    document.getElementById('correctCount').textContent = '0';
    document.getElementById('incorrectCount').textContent = '0';
    document.getElementById('progress').style.width = '0%';
    document.getElementById('questionsContainer').innerHTML = '';
}

window.onload = function() {
    const params = new URLSearchParams(window.location.search);
    if (params.has('r')) {
        const scores = params.get('r').split('-');
        document.getElementById('finalScore').textContent = scores[0];
        document.getElementById('finalCorrect').textContent = scores[0];
        document.getElementById('finalIncorrect').textContent = scores[1] || '0';
        document.getElementById('header').classList.add('hidden');
        document.getElementById('result').classList.remove('hidden');
    }
};
</script>
